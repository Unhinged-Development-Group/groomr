<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-body);}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;}
.box{display:flex;flex-direction:column;align-items:center;gap:8px;}
.r{background:rgba(136,160,150,0.30);border:1px solid rgba(136,160,150,0.50);}
.s4{width:16px;height:16px;}.s6{width:24px;height:24px;}.s8{width:32px;height:32px;}
.s10{width:40px;height:40px;}.s12{width:48px;height:48px;}.s16{width:64px;height:64px;}
.lbl{font-size:11px;font-weight:700;color:#95a5a6;letter-spacing:0.05em;}
.lbl b{color:#2c3e50;}
</style></head><body>
<div class="row">
  <div class="box"><div class="r s4"></div><div class="lbl"><b>4</b> · 4px</div></div>
  <div class="box"><div class="r s6"></div><div class="lbl"><b>6</b> · 24px</div></div>
  <div class="box"><div class="r s8"></div><div class="lbl"><b>8</b> · 32px</div></div>
  <div class="box"><div class="r s10"></div><div class="lbl"><b>10</b> · 40px</div></div>
  <div class="box"><div class="r s12"></div><div class="lbl"><b>12</b> · 48px</div></div>
  <div class="box"><div class="r s16"></div><div class="lbl"><b>16</b> · 64px</div></div>
</div>
</body></html>
