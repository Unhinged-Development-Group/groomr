<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Groomr · Website UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="stylesheet" href="../../colors_and_type.css?v=cream-cta-2"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "deep-slate":      "#2c3e50",
            "groomr-gold":     "#eae45c",
            "alabaster-cream": "#f9f8f4",
            "muted-terracotta":"#c87964",
            "sage-leaf":       "#88a096",
            "pebble-grey":     "#95a5a6",
          },
          fontFamily: {
            fredoka: ['Fredoka','system-ui','sans-serif'],
            nunito:  ['Nunito','system-ui','sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    body { background: #f9f8f4; color: #2c3e50; font-family: 'Nunito', system-ui, sans-serif; }
    .btn-primary {
      background-color: #eae45c; color: #2c3e50;
      transition: background-color .3s ease, color .3s ease, transform .15s ease;
    }
    .btn-primary:hover { background-color: #c87964; color: #f9f8f4; }
    .btn-primary:active { transform: scale(.97); }

    .btn-secondary {
      border: 2px solid #2c3e50; color: #2c3e50; background: transparent;
    }
    .btn-secondary:hover { background: #2c3e50; color: #f9f8f4; }
    .btn-secondary:active { transform: scale(.97); }

    .focus-ring:focus-visible { outline: 2px solid #eae45c; outline-offset: 2px; }
    .card-lift { transition: transform .3s ease, box-shadow .3s ease; }
    .card-lift:hover { transform: translateY(-4px); box-shadow: 0 18px 32px -16px rgba(44,62,80,.18); }

    /* Reduce font weight on Fredoka for tighter feel */
    .font-fredoka { font-weight: 500; letter-spacing: -0.01em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Icons.jsx?v=cream-cta-2"></script>
  <script type="text/babel" src="Buttons.jsx?v=cream-cta-2"></script>
  <script type="text/babel" src="SearchPill.jsx?v=cream-cta-2"></script>
  <script type="text/babel" src="Header.jsx?v=cream-cta-2"></script>
  <script type="text/babel" src="Footer.jsx?v=cream-cta-2"></script>

  <script type="text/babel" src="screens/Landing.jsx?v=for-groomers-cleaner"></script>
