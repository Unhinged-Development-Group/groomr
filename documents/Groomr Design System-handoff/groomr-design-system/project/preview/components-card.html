<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-body);}
.card{background:#fff;border:1px solid rgba(149,165,166,0.20);border-radius:12px;padding:24px;box-shadow:0 4px 6px -1px rgba(149,165,166,0.10), 0 2px 4px -1px rgba(149,165,166,0.06);display:flex;gap:16px;align-items:center;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
.card:hover{transform:translateY(-4px);box-shadow:0 10px 15px -3px rgba(149,165,166,0.40), 0 4px 6px -2px rgba(149,165,166,0.20);}
.icon{width:56px;height:56px;border-radius:9999px;background:rgba(234,228,92,0.55);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.icon svg{width:30px;height:30px;}
h3{font-family:var(--font-display);font-weight:700;font-size:20px;color:#2c3e50;margin:0 0 4px;}
p{margin:0;font-size:14px;color:rgba(44,62,80,0.80);line-height:1.5;}
</style></head><body>
<div class="card">
  <div class="icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="#2c3e50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 12l2 2 4-4" stroke="#2c3e50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div><h3>Trust first.</h3><p>Only groomers we'd trust with our own dogs.</p></div>
</div>
</body></html>
