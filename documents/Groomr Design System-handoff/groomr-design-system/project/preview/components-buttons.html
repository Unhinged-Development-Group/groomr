<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:28px;background:var(--bg-canvas);font-family:var(--font-body);display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
button{font-family:var(--font-body);font-weight:700;font-size:15px;border-radius:9999px;padding:11px 26px;cursor:pointer;border:none;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
.primary{background:#eae45c;color:#2c3e50;}
.primary:hover{background:#c87964;color:#f9f8f4;}
.secondary{background:transparent;border:2px solid #2c3e50;color:#2c3e50;padding:9px 24px;}
.secondary:hover{background:#2c3e50;color:#f9f8f4;}
.ghost{background:transparent;color:#95a5a6;}
.ghost:hover{color:#2c3e50;}
.focus{box-shadow:0 0 0 3px #eae45c;background:#eae45c;color:#2c3e50;}
</style></head><body>
<button class="primary">Book Appointment</button>
<button class="secondary">View Profile</button>
<button class="ghost">Cancel</button>
<button class="focus">Focused</button>
</body></html>
