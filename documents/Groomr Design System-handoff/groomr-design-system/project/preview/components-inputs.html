<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:28px;background:var(--bg-canvas);font-family:var(--font-body);display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-weight:700;font-size:13px;color:#2c3e50;}
input,select{font-family:var(--font-body);font-size:15px;padding:11px 16px;border-radius:12px;border:1px solid rgba(149,165,166,0.30);background:#fff;color:#2c3e50;outline:none;box-shadow:0 1px 2px rgba(149,165,166,0.10);}
input:focus,select:focus{box-shadow:0 0 0 3px #eae45c;border-color:#eae45c;}
.search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(149,165,166,0.20);border-radius:9999px;padding:6px 6px 6px 18px;}
.search input{border:none;flex:1;padding:8px 0;box-shadow:none;}
.search input:focus{box-shadow:none;}
.search button{background:#eae45c;color:#2c3e50;border:none;border-radius:9999px;padding:9px 22px;font-weight:700;font-family:var(--font-body);font-size:14px;cursor:pointer;}
</style></head><body>
<div class="field"><label>Email Address</label><input type="email" placeholder="you@example.com"></div>
<div class="search"><span style="color:#95a5a6;">🔍</span><input placeholder="Enter your postcode, town, or city..."><button>Search</button></div>
</body></html>
