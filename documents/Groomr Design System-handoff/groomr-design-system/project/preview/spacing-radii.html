<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-body);}
.row{display:flex;gap:14px;align-items:flex-end;}
.box{display:flex;flex-direction:column;align-items:center;gap:8px;}
.b{width:80px;height:64px;background:#fff;border:1px solid rgba(149,165,166,0.30);}
.r4{border-radius:4px;}.r8{border-radius:8px;}.r12{border-radius:12px;}.r16{border-radius:16px;}.r24{border-radius:24px;}.rp{border-radius:9999px;}
.lbl{font-size:11px;font-weight:700;letter-spacing:0.05em;color:#2c3e50;}
.lbl span{color:#95a5a6;font-weight:400;}
</style></head><body>
<div class="row">
  <div class="box"><div class="b r4"></div><div class="lbl">sm <span>4px</span></div></div>
  <div class="box"><div class="b r8"></div><div class="lbl">md <span>8px</span></div></div>
  <div class="box"><div class="b r12"></div><div class="lbl">lg <span>12px</span></div></div>
  <div class="box"><div class="b r16"></div><div class="lbl">xl <span>16px</span></div></div>
  <div class="box"><div class="b r24"></div><div class="lbl">2xl <span>24px</span></div></div>
  <div class="box"><div class="b rp"></div><div class="lbl">pill <span>9999px</span></div></div>
</div>
</body></html>
