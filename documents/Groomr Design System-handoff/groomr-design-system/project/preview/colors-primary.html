<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-body);color:var(--fg-primary);}
.row{display:flex;gap:12px;align-items:stretch;}
.sw{flex:1;border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;justify-content:flex-end;min-height:90px;border:1px solid var(--border-subtle);}
.sw .name{font-family:var(--font-display);font-weight:700;font-size:14px;}
.sw .hex{font-size:11px;font-weight:700;letter-spacing:0.05em;opacity:.85;margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#eae45c;color:#2c3e50;"><div class="name">Groomr Gold</div><div class="hex">#EAE45C</div></div>
  <div class="sw" style="background:#2c3e50;color:#f9f8f4;"><div class="name">Deep Slate</div><div class="hex">#2C3E50</div></div>
  <div class="sw" style="background:#88a096;color:#2c3e50;"><div class="name">Sage Leaf</div><div class="hex">#88A096</div></div>
</div>
</body></html>
