<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:24px;background:var(--bg-canvas);font-family:var(--font-body);color:var(--fg-primary);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.row{display:flex;align-items:center;gap:12px;font-size:13px;}
.chip{width:40px;height:40px;border-radius:8px;border:1px solid var(--border-subtle);flex-shrink:0;}
.label{font-weight:700;}
.role{color:var(--fg-tertiary);font-size:11px;text-transform:uppercase;letter-spacing:0.1em;}
</style></head><body>
<div class="grid">
  <div class="row"><div class="chip" style="background:var(--bg-canvas);"></div><div><div class="label">bg-canvas</div><div class="role">Page bg</div></div></div>
  <div class="row"><div class="chip" style="background:var(--fg-primary);"></div><div><div class="label">fg-primary</div><div class="role">Body text</div></div></div>
  <div class="row"><div class="chip" style="background:var(--accent-primary);"></div><div><div class="label">accent-primary</div><div class="role">CTA fill</div></div></div>
  <div class="row"><div class="chip" style="background:var(--accent-secondary);"></div><div><div class="label">accent-secondary</div><div class="role">CTA hover</div></div></div>
  <div class="row"><div class="chip" style="background:var(--accent-quiet);"></div><div><div class="label">accent-quiet</div><div class="role">Structure</div></div></div>
  <div class="row"><div class="chip" style="background:var(--fg-tertiary);"></div><div><div class="label">fg-tertiary</div><div class="role">Meta / placeholder</div></div></div>
</div>
</body></html>
