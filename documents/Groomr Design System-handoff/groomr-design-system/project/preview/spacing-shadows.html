<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:28px;background:var(--bg-canvas);font-family:var(--font-body);}
.row{display:flex;gap:24px;align-items:flex-end;}
.box{display:flex;flex-direction:column;align-items:center;gap:10px;}
.b{width:120px;height:64px;background:#fff;border-radius:12px;border:1px solid rgba(149,165,166,0.10);}
.s1{box-shadow:0 4px 6px -1px rgba(149,165,166,0.10), 0 2px 4px -1px rgba(149,165,166,0.06);}
.s2{box-shadow:0 10px 15px -3px rgba(149,165,166,0.40), 0 4px 6px -2px rgba(149,165,166,0.20);}
.s3{box-shadow:0 25px 50px -12px rgba(44, 62, 80, 0.25);}
.lbl{font-size:11px;font-weight:700;color:#2c3e50;letter-spacing:0.05em;}
.lbl span{display:block;color:#95a5a6;font-weight:400;margin-top:2px;}
</style></head><body>
<div class="row">
  <div class="box"><div class="b s1"></div><div class="lbl">SHADOW-SUBTLE<span>resting cards</span></div></div>
  <div class="box"><div class="b s2"></div><div class="lbl">SHADOW-LIFT<span>hover state</span></div></div>
  <div class="box"><div class="b s3"></div><div class="lbl">SHADOW-MODAL<span>overlays</span></div></div>
</div>
</body></html>
