<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css?v=fonts-local-1"><style>
body{margin:0;padding:28px;background:var(--bg-canvas);font-family:var(--font-body);display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.pill{font-family:var(--font-body);font-weight:700;font-size:13px;padding:6px 14px;border-radius:9999px;border:1px solid;display:inline-flex;align-items:center;gap:6px;}
.gold{background:rgba(234,228,92,0.20);color:#2c3e50;border-color:rgba(234,228,92,0.40);}
.sage{background:rgba(136,160,150,0.10);color:#88a096;border-color:rgba(136,160,150,0.30);}
.terra{background:rgba(200,121,100,0.10);color:#c87964;border-color:rgba(200,121,100,0.30);}
.slate{background:rgba(44,62,80,0.08);color:#2c3e50;border-color:rgba(44,62,80,0.20);}
</style></head><body>
<span class="pill gold">CONFIRMED</span>
<span class="pill sage">★ 4.8+ Rating</span>
<span class="pill terra">4 Groomers Found</span>
<span class="pill slate">Full Groom</span>
<span class="pill sage">Free to use</span>
</body></html>
