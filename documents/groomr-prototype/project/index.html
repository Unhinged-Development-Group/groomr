<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Groomr — Your dog deserves a regular.</title>
  <link rel="icon" type="image/png" href="assets/logo-mark-groomr-gold.png" />
  <link rel="stylesheet" href="colors_and_type.css" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "deep-slate":      "#2c3e50",
            "groomr-gold":     "#eae45c",
            "alabaster-cream": "#f9f8f4",
            "muted-terracotta":"#c87964",
            "sage-leaf":       "#88a096",
            "pebble-grey":     "#95a5a6",
          },
          fontFamily: {
            fredoka: ['Fredoka','system-ui','sans-serif'],
            nunito:  ['Nunito','system-ui','sans-serif'],
          },
          boxShadow: {
            subtle: '0 4px 6px -1px rgba(149,165,166,.10), 0 2px 4px -1px rgba(149,165,166,.06)',
            lift:   '0 10px 15px -3px rgba(149,165,166,.40), 0 4px 6px -2px rgba(149,165,166,.20)',
            modal:  '0 25px 50px -12px rgba(44,62,80,.25)',
          },
        },
      },
    };
  </script>

  <style>
    body { background: #f9f8f4; color: #2c3e50; font-family: 'Nunito', system-ui, sans-serif; }

    /* Buttons */
    .btn-primary {
      background-color: #eae45c; color: #2c3e50;
      transition: background-color .3s cubic-bezier(.4,0,.2,1), color .3s cubic-bezier(.4,0,.2,1);
    }
    .btn-primary:hover { background-color: #c87964; color: #f9f8f4; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-primary:disabled:hover { background-color: #eae45c; color: #2c3e50; }

    .btn-secondary {
      border: 2px solid #2c3e50; color: #2c3e50; background: transparent;
      transition: background-color .3s cubic-bezier(.4,0,.2,1), color .3s cubic-bezier(.4,0,.2,1);
    }
    .btn-secondary:hover { background: #2c3e50; color: #f9f8f4; }

    .btn-gold-on-dark {
      background-color: #eae45c; color: #2c3e50;
      transition: background-color .3s cubic-bezier(.4,0,.2,1), color .3s cubic-bezier(.4,0,.2,1);
    }
    .btn-gold-on-dark:hover { background-color: #c87964; color: #f9f8f4; }

    .focus-ring { outline: none; }
    .focus-ring:focus-visible { box-shadow: 0 0 0 3px #eae45c; }

    /* Card lift */
    .card-lift { transition: transform .3s cubic-bezier(.4,0,.2,1), box-shadow .3s cubic-bezier(.4,0,.2,1); }
    .card-lift:hover { transform: translateY(-4px); box-shadow: 0 18px 32px -16px rgba(44,62,80,.18); }

    /* Lighter Fredoka */
    .font-fredoka { font-weight: 500; letter-spacing: -0.01em; }

    /* Text link colour shift */
    .text-link { color: inherit; transition: color .3s cubic-bezier(.4,0,.2,1); }
    .text-link:hover { color: #c87964; }

    /* Modal overlay */
    .modal-backdrop {
      background: rgba(44,62,80,.6); backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    /* Page transitions */
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-fade { animation: pageIn .25s cubic-bezier(.4,0,.2,1); }

    /* Hide scrollbar but keep scroll */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Map dot pulse */
    @keyframes pinPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .map-pin-active { animation: pinPulse 1.6s cubic-bezier(.4,0,.2,1) infinite; }

    /* Custom scrollbar for time slot strip */
    .scroll-fade {
      mask-image: linear-gradient(to right, transparent, #000 24px, #000 calc(100% - 24px), transparent);
    }

    /* Inputs */
    .field {
      width: 100%; background: white; border: 1px solid rgba(149,165,166,.30);
      border-radius: 12px; padding: 12px 14px;
      font-family: 'Nunito', system-ui, sans-serif; color: #2c3e50;
      transition: box-shadow .15s, border-color .15s;
    }
    .field::placeholder { color: rgba(149,165,166,.65); }
    .field:focus { outline: none; box-shadow: 0 0 0 3px #eae45c; border-color: transparent; }

    /* Tagline */
    .tagline { font-family: 'Nunito', system-ui, sans-serif; font-style: italic; font-weight: 700; }

    /* Toast */
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast-in { animation: toastIn .3s cubic-bezier(.4,0,.2,1); }
  </style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/screens/Profile.jsx"></script>
  <script type="text/babel" src="src/screens/Booking.jsx"></script>

  <script type="text/babel" src="src/screens/Messages.jsx"></script>
  <script type="text/babel" src="src/screens/GroomerDashboard.bookings.jsx"></script>
  <script type="text/babel" src="src/screens/GroomerDashboard.editor.jsx"></script>
  <script type="text/babel" src="src/screens/GroomerDashboard.jsx"></script>
  <script type="text/babel" src="src/screens/ForGroomers.jsx"></script>

</html>
